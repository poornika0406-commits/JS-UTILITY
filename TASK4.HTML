<!DOCTYPE html>
<html>
    <body>



<h1>CHECKING NUM IS ODD OR EVEN</h1>

<h2 id="result"></h2>

<script>
let num = 7;
let output;

if (num % 2 === 0) {
  output = "Even";
} else {
  output = "Odd";
}

document.getElementById("result").innerText = output;
</script>
</body>
</html>
