<!DOCTYPE html>
<html>
<body>

<h2>Pattern Printing</h2>

<div id="output"></div>

<script>
let text = "";

// 🔹 1. Star Triangle
text += "<b>Star Triangle</b><br>";
for (let i = 1; i <= 5; i++) {
  for (let j = 1; j <= i; j++) {
    text += "*";
  }
  text += "<br>";
}
text += "<br>";

// 🔹 2. Reverse Star
text += "<b>Reverse Star</b><br>";
for (let i = 5; i >= 1; i--) {
  for (let j = 1; j <= i; j++) {
    text += "*";
  }
  text += "<br>";
}
text += "<br>";

// 🔹 3. Number Pattern
text += "<b>Number Pattern</b><br>";
for (let i = 1; i <= 5; i++) {
  for (let j = 1; j <= i; j++) {
    text += j;
  }
  text += "<br>";
}
text += "<br>";

// 🔹 4. Same Number Pattern
text += "<b>Same Number Pattern</b><br>";
for (let i = 1; i <= 5; i++) {
  for (let j = 1; j <= i; j++) {
    text += i;
  }
  text += "<br>";
}
text += "<br>";

// 🔹 5. Reverse Number Pattern
text += "<b>Reverse Number</b><br>";
for (let i = 1; i <= 5; i++) {
  for (let j = i; j >= 1; j--) {
    text += j;
  }
  text += "<br>";
}
text += "<br>";

// 🔹 6. Pyramid Star Pattern
text += "<b>Pyramid</b><br>";
for (let i = 1; i <= 5; i++) {
  for (let s = 1; s <= 5 - i; s++) {
    text += "&nbsp;&nbsp;";
  }
  for (let j = 1; j <= i; j++) {
    text += "* ";
  }
  text += "<br>";
}
text += "<br>";

// 🔹 7. Full Pyramid
text += "<b>Full Pyramid</b><br>";
for (let i = 1; i <= 5; i++) {
  for (let s = 1; s <= 5 - i; s++) {
    text += "&nbsp;";
  }
  for (let j = 1; j <= (2*i - 1); j++) {
    text += "*";
  }
  text += "<br>";
}

document.getElementById("output").innerHTML = text;
</script>

</body>
</html>
