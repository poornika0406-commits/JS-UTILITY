<!DOCTYPE html>
<html>
<body>

<h2 id="output"></h2>

<script>
let num = 5;   // change this number

let text = "";

for (let i = 1; i <= 10; i++) {
  text += num + " x " + i + " = " + (num * i) + "<br>";
}

document.getElementById("output").innerHTML = text;
</script>

</body>
</html>
