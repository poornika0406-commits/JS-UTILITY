<!DOCTYPE html>
<html>
<head>
  <title>Function Demo</title>
</head>
<body>

  <h1 id="text">Hello</h1>

  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.getElementById("text").innerText = "You clicked!";
    }
  </script>

</body>
</html>
